version: '3.8'

# Version simplifiée - utilise le Nginx existant du serveur
services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: navixy-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
    networks:
      - navixy-network

  # Backend API (FastAPI)
  backend:
    build: ./backend
    container_name: navixy-backend
    restart: always
    ports:
      - "127.0.0.1:8010:8000"  # Port 8010 pour éviter conflits
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=navixy_dashboard
      - NAVIXY_HASH=a25480874b7492bd01ff1d926061e491
      - NAVIXY_API_URL=https://api.navixy.com/v2
      - BASE_DOMAIN=logitrak.ch
      - CORS_ORIGINS=https://dashboard.logitrak.ch,https://*.logitrak.ch
    depends_on:
      - mongodb
    networks:
      - navixy-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=https://dashboard.logitrak.ch
    container_name: navixy-frontend
    restart: always
    ports:
      - "127.0.0.1:8011:80"  # Port 8011 pour éviter conflits
    depends_on:
      - backend
    networks:
      - navixy-network

volumes:
  mongodb_data:

networks:
  navixy-network:
    driver: bridge
