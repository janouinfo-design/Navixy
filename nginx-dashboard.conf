# Configuration Nginx pour dashboard.logitrak.ch
# À ajouter dans /etc/nginx/sites-available/dashboard.logitrak.ch

server {
    listen 80;
    server_name dashboard.logitrak.ch;
    
    # Redirection vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
    
    # Pour Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name dashboard.logitrak.ch;

    # SSL - sera configuré par certbot
    ssl_certificate /etc/letsencrypt/live/dashboard.logitrak.ch/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.logitrak.ch/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    # API Backend
    location /api/ {
        proxy_pass http://127.0.0.1:8010/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Frontend
    location / {
        proxy_pass http://127.0.0.1:8011/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
